name: Daily TIL Review

on:
  schedule:
    - cron: '0 0 * * 1,3,5'  # 월수금 한국시간 오전 9시 (UTC 0시)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run review scheduler
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/review_scheduler.py

      - name: Commit review state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews.json
          git diff --staged --quiet || git commit -m "chore: update review state [skip ci]"
          git push
